services:
  # Local PostgreSQL for development
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: todoapp
      POSTGRES_PASSWORD: todoapp_secret_123
      POSTGRES_DB: todoapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todoapp -d todoapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  # Backend with local PostgreSQL (default)
  backend-local:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend-local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://todoapp:todoapp_secret_123@postgres:5432/todoapp
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars-long-for-security-in-prod-change-this}
      JWT_EXPIRES_IN: 15m
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:80,http://100.54.47.214
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      todo-network:
        aliases:
          - backend
    profiles:
      - local

  # Backend with RDS (production-like)
  backend-rds:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend-rds
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars-long-for-security-in-prod-change-this}
      JWT_EXPIRES_IN: 15m
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:80,http://100.54.47.214
    ports:
      - "3000:3000"
    networks:
      todo-network:
        aliases:
          - backend
    profiles:
      - rds

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend-local
    networks:
      - todo-network
    profiles:
      - local

  # Frontend for RDS mode
  frontend-rds:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend-rds
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend-rds
    networks:
      - todo-network
    profiles:
      - rds

volumes:
  postgres_data:

networks:
  todo-network:
    driver: bridge
