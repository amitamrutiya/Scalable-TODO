apiVersion: v1
kind: Service
metadata:
  # IMPORTANT: must be "backend" — nginx.conf proxies to http://backend:3000
  name: backend
  namespace: todo-app
  labels:
    app: backend
    app.kubernetes.io/name: todo-app
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
